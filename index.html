<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi HP Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 300px;
            width: 80%;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { font-size: 16px; opacity: 0.9; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #fff;
            color: #764ba2;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Halo Dunia! 👋</h1>
        <p>Aplikasi web ini dibuat dan di-deploy langsung menggunakan HP.</p>
        <a href="#" class="btn">Pelajari Lebih Lanjut</a>
    </div>

</body>
</html>
